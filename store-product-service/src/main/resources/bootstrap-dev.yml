server:
  port: 9000
  tomcat:
    uri-encoding: UTF-8
spring:
  application:
    name: product-service
  cloud:
    nachos:
      discovery:
        server-adder: 127.0.0.1:8848
      config:
        server-adder: 127.0.0.1:8848
        file-extension: yaml
  config:
    import: optional:nacos:${spring.application.name}.yaml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/store?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
  mvc:
    path match:
      matching-strategy: ant_path_matcher
