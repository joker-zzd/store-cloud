server:
  port: 7000

spring:
  application:
    name: auth-service
  config:
    import: optional:nacos:${spring.application.name}.yaml
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 3s
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 5000
