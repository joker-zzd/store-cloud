server:
  port: 7000

spring:
  application:
    name: auth-service
  config:
    import: optional:nacos:${spring.application.name}.yaml
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 3s
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 5000

store:
  security:
    jwt:
      secret: store-cloud-auth-refresh-secret-key-2026-demo
      access-ttl: 30m
      refresh-ttl: 7d


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

