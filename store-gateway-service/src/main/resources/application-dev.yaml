server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/product/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true

store:
  security:
    jwt:
      secret: store-cloud-auth-refresh-secret-key-2026-demo

knife4j:
  gateway:
    enabled: true
    strategy: manual
    tags-sorter: alpha
    operations-sorter: alpha
    routes:
      - name: Auth Service
        service-name: auth-service
        url: /auth/v3/api-docs
        context-path: /auth
        order: 1
      - name: User Service
        service-name: user-service
        url: /user/v3/api-docs
        context-path: /user
        order: 2
      - name: Product Service
        service-name: product-service
        url: /product/v3/api-docs
        context-path: /product
        order: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway